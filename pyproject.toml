[tool.black]
line-length = 110
skip-string-normalization = true
target-version = ['py312']
extend-exclude = 'migrations'

[tool.isort]
profile = "black"
line_length = 110
skip_glob = ["*/migrations/*"]
known_first_party = ["apps", "core"]

[tool.coverage.run]
omit = ["*/migrations/*", "*/tests/*", "manage.py", "core/wsgi.py", "core/asgi.py"]
