services:
  db:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-delivery_erp}_db
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-delivery_erp}_redis
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ${PROJECT_NAME:-delivery_erp}_web
    restart: unless-stopped
    volumes:
      - media_data:/app/media
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-8000}:8000"
    networks:
      - backend

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ${PROJECT_NAME:-delivery_erp}_worker
    restart: unless-stopped
    entrypoint: []
    command: celery -A core worker -l info -Q default,gps,finance,notifications
    volumes:
      - media_data:/app/media
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - backend

  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ${PROJECT_NAME:-delivery_erp}_beat
    restart: unless-stopped
    entrypoint: []
    command: celery -A core beat -l info
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    name: ${PROJECT_NAME:-delivery_erp}_backend
    driver: bridge

volumes:
  postgres_data:
    name: ${PROJECT_NAME:-delivery_erp}_postgres_data
  media_data:
    name: ${PROJECT_NAME:-delivery_erp}_media_data
